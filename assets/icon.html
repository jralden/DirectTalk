<!doctype html>
<html>
<head>
<meta charset="utf-8">
<style>
  html,body { margin:0; padding:0; background:transparent; }
  #c { width:1024px; height:1024px; }
</style>
</head>
<body>
<svg id="c" width="1024" height="1024" viewBox="0 0 1024 1024" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#4f7cff"/>
      <stop offset="1" stop-color="#2546c7"/>
    </linearGradient>
    <linearGradient id="bubbleA" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#ffffff"/>
      <stop offset="1" stop-color="#eaf0ff"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="14" stdDeviation="22" flood-color="#0a1a55" flood-opacity="0.28"/>
    </filter>
  </defs>

  <!-- Big Sur style rounded-square (squircle-ish) background -->
  <rect x="0" y="0" width="1024" height="1024" rx="229" ry="229" fill="url(#bg)"/>

  <!-- Back bubble (the "client") -->
  <g filter="url(#shadow)" opacity="0.92">
    <path fill="#9fc0ff" d="
      M 545 250
      h 250 a 70 70 0 0 1 70 70
      v 150 a 70 70 0 0 1 -70 70
      h -150 l -85 70 v -70 h -15 a 70 70 0 0 1 -70 -70
      v -150 a 70 70 0 0 1 70 -70 z"/>
  </g>

  <!-- Front bubble (the "host") -->
  <g filter="url(#shadow)">
    <path fill="url(#bubbleA)" d="
      M 229 360
      h 250 a 70 70 0 0 1 70 70
      v 170 a 70 70 0 0 1 -70 70
      h -150 l -95 80 v -80 h -5 a 70 70 0 0 1 -70 -70
      v -170 a 70 70 0 0 1 70 -70 z"/>
    <circle cx="305" cy="515" r="26" fill="#3a5bd0"/>
    <circle cx="404" cy="515" r="26" fill="#3a5bd0"/>
    <circle cx="503" cy="515" r="26" fill="#3a5bd0"/>
  </g>
</svg>
</body>
</html>
